<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>VPN Access Required</title>

    <meta
      name="description"
      content="This application requires access through the authorized VPN network."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="/_errors/vpn-required/style.css" />
  </head>

  <body>
    <main class="page" aria-labelledby="error-title">
      <section class="card" role="alert">
        <h1 id="error-title">VPN access required</h1>

        <p>
          This workspace is only available from the authorized private network.
        </p>

        <p>Connect to VPN, then refresh this page.</p>

        <p>Already connected? Contact your system administrator.</p>
      </section>
    </main>
  </body>
</html>
