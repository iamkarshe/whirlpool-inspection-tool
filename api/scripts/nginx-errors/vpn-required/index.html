<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VPN Required</title>

    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      .card {
        max-width: 560px;
        background: #111827;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin-top: 0;
        color: #f9fafb;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>403 · VPN Required</h1>
      <p>
        This application is restricted to authorized private network access.
      </p>
      <p>Please connect to the company VPN and reload this page.</p>
      <p>If you are already connected, contact the system administrator.</p>
    </main>
  </body>
</html>
