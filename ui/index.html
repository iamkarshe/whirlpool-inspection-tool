<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover"
    />

    <meta name="application-name" content="%VITE_APP_TITLE%" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
      id="apple-status-bar-meta"
    />
    <meta name="theme-color" content="#ffffff" id="theme-color-meta" />
    <meta name="color-scheme" content="light" id="color-scheme-meta" />

    <meta property="og:title" content="Whirlpool PDI Tool" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Whirlpool PDI Tool" />
    <meta property="og:url" content="https://whirlpool.scoptanalytics.in/" />
    <meta
      property="og:description"
      content="Login and manage product inspections at Whirlpool PDI Tool."
    />
    <meta property="og:image" content="/assets/opengraph/default.png" />

    <script>
      (function () {
        var key = "whirlpool.theme";
        var stored = localStorage.getItem(key);
        var theme = stored === "dark" ? "dark" : "light";
        var root = document.documentElement;
        root.classList.toggle("dark", theme === "dark");
        root.style.colorScheme = theme;
        var themeColor = theme === "dark" ? "#0a0a0a" : "#ffffff";
        var statusBar = theme === "dark" ? "black" : "default";
        var scheme = theme === "dark" ? "dark" : "light";
        var tc = document.getElementById("theme-color-meta");
        if (tc) tc.setAttribute("content", themeColor);
        var apple = document.getElementById("apple-status-bar-meta");
        if (apple) apple.setAttribute("content", statusBar);
        var cs = document.getElementById("color-scheme-meta");
        if (cs) cs.setAttribute("content", scheme);
      })();
    </script>

    <link rel="manifest" href="/manifest.json?v=1.1" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <script>
      window.__WHIRLPOOL_ENV__ = {
        VITE_API_BASE_URL: "%VITE_API_BASE_URL%",
        VITE_PROD_URL: "%VITE_PROD_URL%",
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <title>%VITE_APP_TITLE%</title>

    <style>
      :root {
        --boot-bg: #ffffff;
        --boot-fg: #252525;
        --boot-muted: #737373;
        --boot-track: #e5e5e5;
        --boot-accent: #252525;
      }

      html.dark {
        --boot-bg: #0a0a0a;
        --boot-fg: #fafafa;
        --boot-muted: #a3a3a3;
        --boot-track: #262626;
        --boot-accent: #fafafa;
      }

      #app-boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--boot-bg);
        color: var(--boot-fg);
        font-family:
          "Outfit",
          ui-sans-serif,
          system-ui,
          sans-serif;
        transition:
          opacity 0.2s ease,
          visibility 0.2s ease;
      }

      #app-boot-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-boot-loader__panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        text-align: center;
      }

      .app-boot-loader__spinner {
        position: relative;
        width: 3.5rem;
        height: 3.5rem;
      }

      .app-boot-loader__spinner::before,
      .app-boot-loader__spinner::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        border: 3px solid var(--boot-track);
      }

      .app-boot-loader__spinner::after {
        border-color: var(--boot-accent);
        border-top-color: transparent;
        animation: app-boot-spin 0.8s linear infinite;
      }

      .app-boot-loader__label {
        margin: 0;
        font-size: 0.9375rem;
        font-weight: 500;
        line-height: 1.4;
      }

      .app-boot-loader__hint {
        margin: 0;
        max-width: 16rem;
        font-size: 0.8125rem;
        line-height: 1.45;
        color: var(--boot-muted);
      }

      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-boot-loader__spinner::after {
          animation: none;
          border-top-color: var(--boot-accent);
        }

        #app-boot-loader {
          transition: none;
        }
      }
    </style>
  </head>

  <body>
    <div
      id="app-boot-loader"
      role="status"
      aria-live="polite"
      aria-busy="true"
      aria-label="Loading application"
    >
      <div class="app-boot-loader__panel">
        <div class="app-boot-loader__spinner" aria-hidden="true"></div>
        <p class="app-boot-loader__label">Loading application…</p>
        <p class="app-boot-loader__hint">Preparing your workspace</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
