<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover"
    />

    <meta name="application-name" content="%VITE_APP_TITLE%" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Light default; updated to "black" when user picks dark theme (see theme-init script). -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
      id="apple-status-bar-meta"
    />
    <meta name="theme-color" content="#ffffff" id="theme-color-meta" />
    <meta name="color-scheme" content="light" id="color-scheme-meta" />

    <script>
      (function () {
        var key = "whirlpool.theme";
        var stored = localStorage.getItem(key);
        var theme = stored === "dark" ? "dark" : "light";
        var root = document.documentElement;
        root.classList.toggle("dark", theme === "dark");
        root.style.colorScheme = theme;
        var themeColor = theme === "dark" ? "#0a0a0a" : "#ffffff";
        var statusBar = theme === "dark" ? "black" : "default";
        var scheme = theme === "dark" ? "dark" : "light";
        var tc = document.getElementById("theme-color-meta");
        if (tc) tc.setAttribute("content", themeColor);
        var apple = document.getElementById("apple-status-bar-meta");
        if (apple) apple.setAttribute("content", statusBar);
        var cs = document.getElementById("color-scheme-meta");
        if (cs) cs.setAttribute("content", scheme);
      })();
    </script>

    <link rel="manifest" href="/manifest.json?v=1.1" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <script>
      window.__WHIRLPOOL_ENV__ = {
        VITE_API_BASE_URL: "%VITE_API_BASE_URL%",
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <title>%VITE_APP_TITLE%</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
