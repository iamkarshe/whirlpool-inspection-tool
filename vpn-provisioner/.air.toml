root = "."
tmp_dir = "tmp"

[build]
cmd = "sh -c 'V=$(tr -d \"[:space:]\" < VERSION); go build -ldflags \"-X main.version=$V\" -o ./tmp/vpn-provisioner ./cmd/api'"
bin = "./tmp/vpn-provisioner"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["data", "tmp", "vendor", "wireguard-mock-data"]
delay = 1000
stop_on_error = true

[log]
time = true

[misc]
clean_on_exit = true

