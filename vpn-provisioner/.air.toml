root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/vpn-provisioner ./cmd/api"
bin = "./tmp/vpn-provisioner"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["data", "tmp", "vendor", "wireguard-mock-data"]
delay = 1000
stop_on_error = true

[log]
time = true

[misc]
clean_on_exit = true

